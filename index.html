<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wise Passport</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #d6d1c8;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
  font-family: Georgia, serif;
}

#passport {
  width: 560px;
  height: 380px;
  box-shadow: 0 24px 70px rgba(0,0,0,0.35);
  border-radius: 8px;
  overflow: hidden;
}

.page {
  width: 280px;
  height: 380px;
  overflow: hidden;
  position: relative;
}

.p-left {
  width: 100%; height: 100%;
  background: #f0ebe0;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.p-left::before {
  content: '';
  position: absolute; top: 0; bottom: 0; left: 0; width: 28px;
  background: linear-gradient(to right, rgba(0,0,0,0.08) 0%, transparent 100%);
  pointer-events: none; z-index: 1;
}

.p-right {
  width: 100%; height: 100%;
  background: #f5f0e6;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.p-right::after {
  content: '';
  position: absolute; top: 0; bottom: 0; right: 0; width: 28px;
  background: linear-gradient(to left, rgba(0,0,0,0.08) 0%, transparent 100%);
  pointer-events: none; z-index: 1;
}

.fore-edge {
  position: absolute; top: 4px; bottom: 4px; width: 5px;
  background: repeating-linear-gradient(to bottom, #cdc5b0 0, #cdc5b0 1px, #e6deca 1px, #e6deca 4px);
  pointer-events: none; z-index: 2;
}
.fore-edge.r { right: 0; border-radius: 0 2px 2px 0; }
.fore-edge.l { left: 0;  border-radius: 2px 0 0 2px; }

.pnum {
  position: absolute; bottom: 16px;
  font-size: 11px; letter-spacing: 0.18em;
  color: rgba(26,46,26,0.22); font-family: monospace;
}
.pnum.r { right: 18px; }
.pnum.l { left: 18px; }

/* ============================
   IDENTITY PAGE
   ============================ */
.identity-page {
  width: 100%; height: 100%;
  background: #f0ebe0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 32px;
  position: relative;
}

.identity-inner {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
}

.photo-zone {
  width: 100%;
  flex: 1;
  border: 1.5px dashed #c0392b;
  border-radius: 3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, background 0.2s;
  min-height: 0;
}
.photo-zone:hover {
  background: rgba(192,57,43,0.03);
  border-color: #e04535;
}

.photo-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
  user-select: none;
}

.photo-hint {
  font-size: 9px;
  color: #c0392b;
  font-family: 'Courier New', monospace;
  letter-spacing: 0.06em;
  text-align: center;
}

.ascii-canvas {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
  display: none;
}

.name-fields {
  width: 100%;
  margin-top: 10px;
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.name-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.name-label {
  font-size: 7px;
  letter-spacing: 0.16em;
  color: rgba(26,46,26,0.4);
  font-family: 'Courier New', monospace;
  text-transform: uppercase;
}
.name-value {
  font-size: 10px;
  font-family: 'Courier New', monospace;
  color: #1a2e00;
  font-weight: 600;
  letter-spacing: 0.01em;
  border: none;
  border-bottom: 1px solid rgba(26,46,26,0.15);
  background: transparent;
  outline: none;
  width: 100%;
  padding: 2px 0 3px;
}
.name-value::placeholder {
  color: rgba(26,46,26,0.28);
  font-weight: 400;
}
.name-group.right { text-align: right; }
.name-group.right .name-value { text-align: right; }

.save-btn {
  margin-top: 10px;
  padding: 9px 20px;
  background: #9FE870;
  color: #163300;
  border: none;
  border-radius: 999px;
  font-size: 9px;
  font-family: 'Courier New', monospace;
  font-weight: 700;
  letter-spacing: 0.1em;
  cursor: not-allowed;
  opacity: 0.55;
  transition: opacity 0.25s, transform 0.15s;
  text-transform: uppercase;
  align-self: center;
  flex-shrink: 0;
  white-space: nowrap;
}
.save-btn.active { opacity: 1; cursor: pointer; }
.save-btn.active:hover { transform: scale(1.03); }
.save-btn.active:active { transform: scale(0.97); }

/* ============================
   CAMERA MODAL
   ============================ */
.camera-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 9999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
}
.camera-modal.open { display: flex; }

.camera-container {
  position: relative;
  width: 320px; height: 400px;
  background: #0a0a0a;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.camera-video {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transform: scaleX(-1);
}
.face-guide {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.face-oval {
  width: 150px; height: 200px;
  border: 2px dashed rgba(159,232,112,0.75);
  border-radius: 50%;
  box-shadow: 0 0 0 2000px rgba(0,0,0,0.28);
}
.camera-hint {
  position: absolute; bottom: 14px; left: 0; right: 0;
  text-align: center; font-size: 10px;
  font-family: 'Courier New', monospace;
  color: rgba(255,255,255,0.5); letter-spacing: 0.1em;
}
.camera-actions { display: flex; gap: 14px; }
.cam-btn {
  padding: 11px 28px; border-radius: 999px; border: none;
  font-family: 'Courier New', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
.cam-btn:hover { opacity: 0.85; transform: scale(1.02); }
.cam-btn:active { transform: scale(0.96); }
.cam-capture { background: #9FE870; color: #163300; }
.cam-cancel  { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.65); border: 1px solid rgba(255,255,255,0.18); }
#captureCanvas { display: none; }

/* ============================
   BOARDING PASS PAGE
   ============================ */
.boarding-pass-wrap {
  width: 100%; height: 100%;
  background: #f0ebe0;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: stretch;
  justify-content: stretch;
  padding: 24px;
}

/* Inner bordered rectangle — the actual boarding pass */
.bp-inner {
  flex: 1;
  border: 1px solid #1a1a14;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #f0ebe0;
}

/* Full-width barcode bands — top and bottom */
.bp-band {
  width: 100%;
  border-top: 1px solid #1a1a14;
  border-bottom: 1px solid #1a1a14;
  padding: 8px 14px 4px;
  flex-shrink: 0;
}
.bp-band.top { border-top: none; }
.bp-band.bottom { border-top: 1px solid #1a1a14; border-bottom: none; padding: 6px 14px 8px; }

.bp-barcode { width: 100%; }
.bp-barcode svg { display: block; }

.bp-ref {
  font-size: 6px;
  font-family: 'Courier New', monospace;
  color: #1a1a14;
  letter-spacing: 0.06em;
  margin-top: 2px;
  text-align: right;
}

/* Middle content area */
.bp-body {
  flex: 1;
  padding: 6px 14px 6px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 0;
}

.bp-token-row {
  display: flex; flex-direction: column; align-items: flex-end;
}
.bp-token-label {
  font-size: 6.5px; font-family: 'Courier New', monospace;
  letter-spacing: 0.16em; color: #1a1a14; text-transform: uppercase;
}
.bp-token-count {
  font-size: 16px; font-family: 'Courier New', monospace;
  font-weight: 700; color: #1a1a14; line-height: 1;
}

/* Code + city block — 40px gap between FRA and city name */
.bp-destination {
  display: flex;
  flex-direction: column;
  gap: 40px;
}
.bp-code-block {
  display: inline-flex; align-items: center;
  background: #1a1a14; color: #fff;
  font-size: 17px;
  font-family: 'Anton', sans-serif;
  letter-spacing: 0.04em;
  padding: 2px 8px;
  line-height: 1.35;
  align-self: flex-start;
}
.bp-city-name {
  font-size: 44px;
  font-family: 'Anton', sans-serif;
  letter-spacing: 0.01em;
  color: #1a1a14;
  line-height: 0.92;
  text-transform: uppercase;
}

/* Divider */
.bp-divider { height: 1px; background: #1a1a14; margin: 0 0 4px; }

/* Meta bottom section */
.bp-footer {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.bp-meta { display: flex; justify-content: space-between; }
.bp-meta-col { display: flex; flex-direction: column; gap: 1px; }
.bp-meta-label {
  font-size: 6.5px; font-family: 'Courier New', monospace;
  letter-spacing: 0.16em; color: #1a1a14; text-transform: uppercase;
}
.bp-meta-value {
  font-size: 9px; font-family: 'Courier New', monospace;
  font-weight: 700; color: #1a1a14;
}
.bp-meta-col.right { text-align: right; }

.bp-passenger {
  font-size: 7.5px; font-family: 'Courier New', monospace; color: #1a1a14;
}
.bp-passenger span { color: #1a1a14; }

/* ============================
   STAMP PAGE
   ============================ */
.stamp-page-wrap {
  width: 100%; height: 100%;
  background: #f5f0e6;
  position: relative; overflow: hidden;
}

.stamp-item {
  position: absolute;
  transform-origin: center center;
}

/* ============================
   NAV
   ============================ */
.nav { display: flex; align-items: center; gap: 20px; }
.btn {
  background: transparent;
  border: 1px solid rgba(0,0,0,0.2);
  padding: 9px 26px; font-size: 11px; letter-spacing: 0.16em;
  cursor: pointer; font-family: monospace; color: #444;
  border-radius: 4px; transition: background 0.15s; text-transform: uppercase;
}
.btn:hover:not(:disabled) { background: rgba(0,0,0,0.07); }
.btn:disabled { opacity: 0.25; cursor: default; }
.indicator {
  font-size: 11px; letter-spacing: 0.18em; color: #666;
  font-family: monospace; min-width: 120px; text-align: center;
}

/* Back button matches nav button style exactly */
#back-btn {
  position: fixed; top: 18px; left: 18px; z-index: 9999;
  background: transparent;
  border: 1px solid rgba(0,0,0,0.2);
  padding: 9px 26px; font-size: 11px; letter-spacing: 0.16em;
  cursor: pointer; font-family: monospace; color: #444;
  border-radius: 4px; transition: background 0.15s; text-transform: uppercase;
  text-decoration: none; display: inline-block;
}
#back-btn:hover { background: rgba(0,0,0,0.07); }
</style>
</head>
<body>

<a id="back-btn" href="wise-map.html">← Map</a>

<!-- Camera Modal -->
<div class="camera-modal" id="cameraModal">
  <div class="camera-container">
    <video class="camera-video" id="cameraVideo" autoplay playsinline muted></video>
    <div class="face-guide"><div class="face-oval"></div></div>
    <div class="camera-hint">Position your face within the oval</div>
  </div>
  <div class="camera-actions">
    <button class="cam-btn cam-cancel" id="camCancel">Cancel</button>
    <button class="cam-btn cam-capture" id="camCapture">Take Photo</button>
  </div>
</div>

<canvas id="captureCanvas"></canvas>

<div id="passport"></div>

<nav class="nav">
  <button class="btn" id="prevBtn" disabled>← prev</button>
  <span class="indicator" id="indicator">pp. 1 – 2</span>
  <button class="btn" id="nextBtn">next →</button>
</nav>

// 6 stamp shapes cycling
// Each returns an SVG string for a 100×80 viewBox stamp
function buildStampSVG(cityName, countryCode, dateStr, colour, shapeIdx, uid) {
  const c = colour;
  const font = "'Courier New', monospace";
  const city = cityName.toUpperCase();
  const country = countryCode.toUpperCase();
  const shapes = ['circle','oval','rectangle','hexagon','octagon','badge'];
  const shape = shapes[shapeIdx % shapes.length];

  // Shared text elements used by most shapes
  function textBlock(cx, topY, midY, botY, midSize, botSize) {

/* ─── Stamp page ─── */
function buildStampPage(cityName,tokens,pageNum){
  const meta=getCityMeta(cityName);
  const count=Math.min(tokens.length,STAMP_POS.length);
  let stamps='';

  for(let i=0;i<count;i++){
    const p=STAMP_POS[i];
    const ts=tokens[i].ts;
    const d=new Date(ts);
    const dateStr=`${['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][d.getMonth()]} ${pad2(d.getDate())} ${d.getFullYear()}`;
    const colour=STAMP_COLOURS[i%STAMP_COLOURS.length];
    const shapeIdx=i;
    const uid=`st${pageNum}_${i}`;
    // Stamp sizing varies slightly by shape — account for different SVG dimensions
    const shapeW=[90,100,96,90,88,90];
    const shapeH=[90,76,72,84,88,90];
    const sw=shapeW[shapeIdx%6];
    const sh=shapeH[shapeIdx%6];
    const svgStr=buildStampSVG(cityName,meta.code,dateStr,colour,shapeIdx,uid);
    // Offset so stamp centre lands on pos
    stamps+=`<div class="stamp-item" style="left:${p.x-sw/2}px;top:${p.y-sh/2}px;transform:rotate(${p.r}deg);">${svgStr}</div>`;
  }

  return $(`<div class="page">
    <div class="stamp-page-wrap">
      <div class="fore-edge r"></div>
      ${stamps}
      <div class="pnum r">${pageNum}</div>
    </div>
  </div>`);
}

/* ═══════════════════════════════════
   HELPERS
   ═══════════════════════════════════ */
function hashStr(s){let h=0x811c9dc5;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193);}return(h>>>0);}
function getDeviceId(){let id=localStorage.getItem('wise_device_id');if(!id){const seed=[navigator.userAgent,navigator.language,screen.width+'x'+screen.height,screen.colorDepth,Intl.DateTimeFormat().resolvedOptions().timeZone,navigator.hardwareConcurrency||'',navigator.deviceMemory||''].join('|');id=hashStr(seed).toString(16);localStorage.setItem('wise_device_id',id);}return id;}
function isFirstTime(){return!localStorage.getItem('wise_identity');}
function getIdentity(){try{return JSON.parse(localStorage.getItem('wise_identity')||'null');}catch{return null;}}
function saveIdentity(obj){localStorage.setItem('wise_identity',JSON.stringify(obj));}
function tokenKey(c){return'wise_tokens_'+c.toLowerCase().replace(/\s/g,'_');}
function getTokens(c){try{return JSON.parse(localStorage.getItem(tokenKey(c))||'[]');}catch{return[];}}
function addToken(c,ts){const a=getTokens(c);a.push({ts,deviceId:getDeviceId()});localStorage.setItem(tokenKey(c),JSON.stringify(a));return a;}
function getAllCitiesWithTokens(){const out=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(!k||!k.startsWith('wise_tokens_'))continue;const slug=k.replace('wise_tokens_','');const name=Object.keys(CITY_META).find(n=>n.toLowerCase().replace(/\s/g,'_')===slug)||slug.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());const tokens=getTokens(name);if(tokens.length)out.push({cityName:name,tokens});}return out;}
function pad2(n){return String(n).padStart(2,'0');}
function fmtDate(ts){const d=new Date(ts);return`${pad2(d.getDate())}.${pad2(d.getMonth()+1)}.${d.getFullYear()}`;}
function fmtTime(ts){const d=new Date(ts);return`${pad2(d.getHours())}:${pad2(d.getMinutes())}`;}
function hexToRgb(hex){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:null;}
function barcodeId(c){const h=hashStr(c+getDeviceId()).toString(16).toUpperCase().padStart(12,'0');return`PW-${h.slice(0,4)}-${h.slice(4,8)}-${h.slice(8,12)}`;}

function makeBarcodeHTML(w,h,seed){
  let bars='',x=0,r=hashStr(seed+'bc');
  while(x<w){const bw=((r%3)+1)*(w/70);r=hashStr(String(r));if(r%3!==0){bars+=`<rect x="${x.toFixed(1)}" y="0" width="${bw.toFixed(1)}" height="${h}" fill="#1a1a14"/>`;}x+=bw*1.3;}
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;
}

/* ═══════════════════════════════════
   BUILD PAGES
   ═══════════════════════════════════ */
let totalPages = 20;

function buildAllPages(){
  const $p=$('#passport');
  $p.empty();
  const identity=getIdentity();
  const cities=getAllCitiesWithTokens();

  // Page 1 — identity       ) spread 1: pp. 1–2
  // Page 2 — blank right    )
  // Page 3 — boarding pass  ) spread 2: pp. 3–4  ← both visible at once
  // Page 4 — stamp          )
  // Page 5 — boarding pass  ) spread 3: pp. 5–6
  // Page 6 — stamp          )  …and so on.

  $p.append(buildIdentityPage(identity));
  $p.append('<div class="page"><div class="p-right"><div class="fore-edge r"></div><div class="pnum r">2</div></div></div>');

  let pn=3;
  cities.forEach(({cityName,tokens})=>{
    $p.append(buildBoardingPassPage(cityName,tokens,pn));
    $p.append(buildStampPage(cityName,tokens,pn+1));
    pn+=2;
  });

  const min=20;
  totalPages=Math.max(min,pn%2===0?pn-1:pn);
  while(pn<=totalPages){
    if(pn%2===1){$p.append(`<div class="page"><div class="p-left"><div class="fore-edge l"></div><div class="pnum l">${pn}</div></div></div>`);}
    else{$p.append(`<div class="page"><div class="p-right"><div class="fore-edge r"></div><div class="pnum r">${pn}</div></div></div>`);}
    pn++;
  }
}

/* ═══════════════════════════════════

   ═══════════════════════════════════ */
function initTurn(){
  try{$('#passport').turn('destroy');}catch(e){}
  buildAllPages();
  $('#passport').turn({
    width:560,height:380,autoCenter:true,elevation:50,
    gradients:true,duration:800,display:'double',page:1,
    when:{turned:function(e,p){updateNav(p);}}
  });
  updateNav(1);
}

function updateNav(page){
  $('#prevBtn').prop('disabled',page<=1);
  $('#nextBtn').prop('disabled',page>=totalPages-1);
  const hi=page>=totalPages-1?totalPages:page+1;
  $('#indicator').text(`pp. ${page} \u2013 ${hi}`);
}

$('#nextBtn').on('click',()=>{try{$('#passport').turn('next');}catch(e){}});
$('#prevBtn').on('click',()=>{try{$('#passport').turn('previous');}catch(e){}});

function goToPage(n){setTimeout(()=>{try{$('#passport').turn('page',n);updateNav(n);}catch(e){}},450);}

/* ═══════════════════════════════════
   IDENTITY FORM — original logic
   ═══════════════════════════════════ */
let photoTaken=false, capturedPhotoData=null, stream=null;

function bindIdentityForm(){
  const photoZone=document.getElementById('photoZone');
  const saveBtn=document.getElementById('saveBtn');
  if(!photoZone||!saveBtn)return;

  function check(){
    const ok=photoTaken&&document.getElementById('firstNameInput').value.trim()&&document.getElementById('lastNameInput').value.trim();
    saveBtn.classList.toggle('active',!!ok);
  }
  document.getElementById('firstNameInput').addEventListener('input',check);
  document.getElementById('lastNameInput').addEventListener('input',check);
  photoZone.addEventListener('click',openCamera);

  saveBtn.addEventListener('click',function(){
    if(!saveBtn.classList.contains('active'))return;
    const identity={firstName:document.getElementById('firstNameInput').value.trim(),lastName:document.getElementById('lastNameInput').value.trim(),photoData:capturedPhotoData||null};
    saveIdentity(identity);
    saveBtn.textContent='✓ Identity Saved';
    saveBtn.style.opacity='0.65';
    saveBtn.style.pointerEvents='none';
    if(pendingCityPage)setTimeout(()=>goToPage(pendingCityPage),300);
  });
}

/* ═══════════════════════════════════
   CAMERA — original logic
   ═══════════════════════════════════ */
function openCamera(){
  document.getElementById('cameraModal').classList.add('open');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:800},audio:false})
    .then(s=>{stream=s;document.getElementById('cameraVideo').srcObject=s;})
    .catch(err=>{document.getElementById('cameraModal').classList.remove('open');alert('Camera unavailable: '+err.message);});
}
function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}document.getElementById('cameraVideo').srcObject=null;}

document.getElementById('camCancel').addEventListener('click',()=>{stopCamera();document.getElementById('cameraModal').classList.remove('open');});
document.getElementById('camCapture').addEventListener('click',()=>{
  const video=document.getElementById('cameraVideo');
  const canvas=document.getElementById('captureCanvas');
  const vw=video.videoWidth||640,vh=video.videoHeight||800;
  canvas.width=vw;canvas.height=vh;
  const ctx=canvas.getContext('2d');
  ctx.save();ctx.translate(vw,0);ctx.scale(-1,1);ctx.drawImage(video,0,0,vw,vh);ctx.restore();
  stopCamera();document.getElementById('cameraModal').classList.remove('open');
  renderDotMatrix(canvas);
});

/* DOT-MATRIX — original logic */
function renderDotMatrix(srcCanvas){
  const zone=document.getElementById('photoZone');
  const OUT_W=zone?(zone.clientWidth||152):152;
  const OUT_H=zone?(zone.clientHeight||170):170;
  const out=document.getElementById('asciiOutput');
  out.width=OUT_W;out.height=OUT_H;
  const outCtx=out.getContext('2d');
  const COLS=60,ROWS=Math.round(COLS*(OUT_H/OUT_W));
  const tmp=document.createElement('canvas');tmp.width=COLS;tmp.height=ROWS;
  const tCtx=tmp.getContext('2d');
  const sw=srcCanvas.width,sh=srcCanvas.height,aspect=OUT_W/OUT_H;
  let cw=sh*aspect,ch=sh,cx=(sw-cw)/2,cy=0;
  if(cw>sw){cw=sw;ch=sw/aspect;cx=0;cy=(sh-ch)/2;}
  tCtx.drawImage(srcCanvas,cx,cy,cw,ch,0,0,COLS,ROWS);
  const imgData=tCtx.getImageData(0,0,COLS,ROWS).data;
  outCtx.fillStyle='#f5f0e6';outCtx.fillRect(0,0,OUT_W,OUT_H);
  const cellW=OUT_W/COLS,cellH=OUT_H/ROWS;
  for(let pass=0;pass<2;pass++){
    outCtx.fillStyle=pass===0?'rgba(168,44,28,0.16)':'#b83020';
    for(let row=0;row<ROWS;row++){
      for(let col=0;col<COLS;col++){
        const i=(row*COLS+col)*4;
        const lum=(0.299*imgData[i]+0.587*imgData[i+1]+0.114*imgData[i+2])/255;
        const maxR=Math.min(cellW,cellH)*0.60;
        const radius=maxR*Math.pow(1-lum,0.78);
        if(radius<0.22)continue;
        outCtx.beginPath();
        outCtx.arc((col+0.5)*cellW,(row+0.5)*cellH,pass===0?radius*1.45:radius,0,Math.PI*2);
        outCtx.fill();
      }
    }
  }
  const grad=outCtx.createRadialGradient(OUT_W/2,OUT_H/2,OUT_H*0.28,OUT_W/2,OUT_H/2,OUT_H*0.72);
  grad.addColorStop(0,'rgba(245,240,230,0)');grad.addColorStop(1,'rgba(245,240,230,0.4)');
  outCtx.fillStyle=grad;outCtx.fillRect(0,0,OUT_W,OUT_H);
  document.getElementById('photoPlaceholder').style.display='none';
  out.style.display='block';
  if(zone){zone.style.border='none';zone.style.cursor='default';zone.removeEventListener('click',openCamera);zone.title='';}
  photoTaken=true;
  capturedPhotoData=out.toDataURL('image/jpeg',0.7);
  const f=document.getElementById('firstNameInput'),l=document.getElementById('lastNameInput'),s=document.getElementById('saveBtn');
  if(f&&l&&s)s.classList.toggle('active',!!(photoTaken&&f.value.trim()&&l.value.trim()));
}

/* ═══════════════════════════════════
   URL PARAMS + ENTRY POINT
   ═══════════════════════════════════ */
const urlParams=new URLSearchParams(location.search);
const incomingCity=urlParams.get('city')?decodeURIComponent(urlParams.get('city')):null;
const incomingTs=urlParams.get('ts')?decodeURIComponent(urlParams.get('ts')):new Date().toISOString();
const fromMap=urlParams.get('from')==='map';
let pendingCityPage=null;

function cityPageNumber(cityName){
  const cities=getAllCitiesWithTokens();
  const idx=cities.findIndex(c=>c.cityName===cityName);
  if(idx===-1)return null;
  return 3+idx*2;
}

$(function(){
  if(incomingCity&&fromMap)addToken(incomingCity,incomingTs);
  initTurn();
  if(!isFirstTime()&&incomingCity){
    const pg=cityPageNumber(incomingCity);
    if(pg)goToPage(pg);
  } else if(isFirstTime()&&incomingCity){
    pendingCityPage=cityPageNumber(incomingCity);
  }
});
</script>
